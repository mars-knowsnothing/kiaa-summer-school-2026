# KIAA Summer School 2026 Nginx 反向代理配置
# Nginx 和 Next.js 在同一个 Docker network 中，通过容器名通信

server {
    listen       80;                            # 监听端口 80
    server_name  _;                             # 匹配所有请求（通过 IP 或任意域名访问）

    # 上传文件大小限制（注册表单包含附件上传）
    client_max_body_size 50m;

    # Gzip 压缩，减少传输体积
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # 所有请求代理到 Next.js 容器
    location / {
        proxy_pass http://app:3000;                     # 通过 Docker network 容器名访问
        proxy_http_version 1.1;                         # 使用 HTTP/1.1 以支持 keep-alive
        proxy_set_header Host $host;                    # 将主机头传递给上游服务
        proxy_set_header X-Real-IP $remote_addr;        # 将真实 IP 传递给上游服务
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;     # 将转发协议传递给上游服务
        proxy_set_header Upgrade $http_upgrade;         # WebSocket 支持
        proxy_set_header Connection "upgrade";          # WebSocket 支持
    }

    # Next.js 静态资源缓存（带 content hash，可长期缓存）
    location /_next/static/ {
        proxy_pass http://app:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
