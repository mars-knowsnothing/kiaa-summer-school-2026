# KIAA Summer School 2026 Nginx 配置
# Nginx 和 Next.js 在同一个 Docker network 中，通过容器名通信

# HTTP → HTTPS 重定向
server {
    listen       80;
    server_name  summer-school-2026.kiaa-pku.cn;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen       443 ssl;
    server_name  summer-school-2026.kiaa-pku.cn;

    # SSL 证书（替换为实际路径）
    ssl_certificate     /etc/nginx/ssl/summer-school-2026.kiaa-pku.cn.crt;
    ssl_certificate_key /etc/nginx/ssl/summer-school-2026.kiaa-pku.cn.key;

    # SSL 协议与加密套件
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 上传文件大小限制（注册表单包含附件上传）
    client_max_body_size 50m;

    # Gzip 压缩，减少传输体积
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # 所有请求代理到 Next.js 容器
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js 静态资源缓存（带 content hash，可长期缓存）
    location /_next/static/ {
        proxy_pass http://app:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
